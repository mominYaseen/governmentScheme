spring.application.name=scheme-navigator

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/schemenavigator}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA — NEVER use ddl-auto=create, always use schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# Server
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Google Gemini (AI Studio)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
# Use gemini-1.5-flash if gemini-2.0-flash is not available for your API key / region
gemini.model=gemini-1.5-flash
gemini.max-output-tokens=1000
gemini.timeout-seconds=30

# OpenAPI / Swagger UI — use /swagger-ui/index.html or /swagger-ui.html (redirects to index)
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.schemenavigator.controller

# Logging
logging.level.com.schemenavigator=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
