spring.application.name=scheme-navigator

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/schemenavigator}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA — NEVER use ddl-auto=create, always use schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# Server
server.port=${PORT:8080}
# Send JSESSIONID on credentialed requests from SPA on another port (e.g. Vite :5173 → API :8080).
# Use HTTPS + secure=true in production behind TLS.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:none}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Google Gemini (AI Studio)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
# gemini-1.5-flash often 404s on v1beta; override with GEMINI_MODEL if needed (see models.list in Gemini docs)
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.max-output-tokens=1000
gemini.timeout-seconds=30
# 429 / transient limits: exponential backoff (429 with free-tier limit:0 needs billing or another model)
gemini.retry.max-attempts=3
gemini.retry.initial-delay-ms=2000

# OpenAPI / Swagger UI — use /swagger-ui/index.html or /swagger-ui.html (redirects to index)
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.schemenavigator.controller
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.api-docs.groups.enabled=true
# Optional: set when frontend calls a deployed API (appears as second server in OpenAPI)
openapi.public-url=

# Logging
logging.level.com.schemenavigator=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# Kaggle / CSV dataset import (~3400 schemes). Use absolute path (empty DATASET_CSV_PATH env would break ${...:default}).
app.dataset.import.enabled=true
app.dataset.import.path=/home/momin/Downloads/archive/updated_data.csv
app.dataset.import.source-tag=KAGGLE_CSV
# Set true once to delete and re-import KAGGLE_CSV rows; then set back to false.
app.dataset.import.force=false

# --- Auth: demo (fixed email/password) or oauth2 (Google). Default demo for local dev.
app.auth.type=${APP_AUTH_TYPE:demo}
app.auth.demo-email=${APP_DEMO_EMAIL:johnDoe@example.com}
app.auth.demo-password=${APP_DEMO_PASSWORD:doeJohn}

# --- OAuth2 (Google) — only when app.auth.type=oauth2. Google Cloud Console: Web client
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:__SET_GOOGLE_OAUTH_CLIENT_ID__}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:__SET_GOOGLE_OAUTH_CLIENT_SECRET__}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Optional second provider (uncomment + set GITHUB_*; Security picks up automatically):
# spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
# spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.github.scope=read:user,user:email

# SPA: session cookie + CSRF (X-XSRF-TOKEN header from XSRF-TOKEN cookie on mutating requests)
# CORS origin must match the browser address exactly (localhost vs 127.0.0.1 are different). Comma-separate for several.
app.auth.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.auth.cors-allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Reminder emails (optional until mail host is set)
app.reminder.enabled=true
app.reminder.interval-days=7
app.reminder.cron=0 0 9 * * *
app.reminder.mail-from=${REMINDER_MAIL_FROM:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
